<body class="bg-black text-white">

<div class="max-w-md mx-auto bg-black min-h-screen relative pb-24">

    <!-- Bottom Navigation -->

        <button class="nav-bottom flex flex-col items-center p-1" data-page="browser">

    <!-- Unlock Modal -->
    <div id="unlockModal" class="hidden fixed inset-0 bg-black/90 z-30 items-center justify-center p-4">

            <button id="confirmUnlockBtn" class="bg-red-600 w-full py-2 rounded-lg font-bold">✅ Continue & Watch Ad</button>

    <!-- Browser Modal -->

    <!-- Profile Modal -->
    <div id="profileModal" class="hidden fixed inset-0 bg-black z-30 overflow-auto p-4">
        <div class="bg-gray-900 rounded-xl p-5">
            <div class="flex justify-between items-center"><h2 class="text-red-500 font-bold">👤 Profile</h2><button id="closeProfileBtn" class="text-white text-xl">✖</button></div>
            <div class="flex items-center space-x-3 my-4">
                <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center text-xl">👤</div>
                <div><p id="tgUsername" class="font-bold">username</p><p id="walletBalance" class="text-sm">💰 Balance: ৳0</p><span id="userStatus" class="text-xs bg-green-900 px-2 py-0.5 rounded-full">Free</span></div>
            </div>
            <div id="socialBarContainer" class="my-3"></div>
            <button id="topupBtn" class="bg-red-800 w-full py-2 rounded my-2 font-bold">💸 Top-up</button>
            <button id="buyPremiumBtn" class="bg-red-800 w-full py-2 rounded font-bold">👑 Buy Premium (৳99)</button>
        </div>
    </div>

    <!-- Support Modal -->
    <div id="supportModal" class="hidden fixed inset-0 bg-black z-30 p-4">
        <div class="bg-gray-900 rounded-xl p-5">
            <div class="flex justify-between items-center"><h2 class="text-red-500 font-bold text-xl">🛠 SUPPORT CENTER</h2><button id="closeSupportBtn" class="text-white text-2xl">&times;</button></div>
            <div id="supportButtons" class="grid gap-3 mt-4"></div>
        </div>
    </div>

    <!-- Top-up Modal -->
    <div id="topupModal" class="hidden fixed inset-0 bg-black z-30 overflow-auto p-4">
        <div class="bg-gray-900 rounded-xl p-5 max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-red-500 font-bold text-xl">💸 TOP-UP</h2><button id="closeTopupBtn" class="text-white text-2xl">&times;</button></div>
            <p class="text-gray-300 text-sm mb-2">নিচের যেকোনো মেথডে Send Money করুন। দয়া করে কল দিনের না।</p>
            <select id="paymentMethodSelect" class="w-full bg-gray-800 p-2 rounded mb-3 border border-gray-700">
                <option value="bKash">bKash (Send Money)</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
            <div id="numberDisplayArea" class="bg-gray-800 p-3 rounded-lg flex justify-between items-center mb-4">
                <span id="dynamicAdminNumber" class="font-mono text-red-400">01XXXXXXXXX</span>
                <button id="copyDynamicNumberBtn" class="bg-red-700 px-3 py-1 rounded text-sm copy-btn">📋 Copy</button>
            </div>
            <input type="text" id="telegramId" placeholder="আপনার টেলিগ্রাম আইডি (@সহ)" class="w-full bg-gray-800 p-2 rounded mb-3">
            <input type="text" id="senderNumber" placeholder="যে নম্বরে পাঠিয়েছেন (Sender Number)" class="w-full bg-gray-800 p-2 rounded mb-3">
            <input type="number" id="topupAmount" placeholder="Amount (Min 20 BDT)" class="w-full bg-gray-800 p-2 rounded mb-3">
            <input type="text" id="transactionId" placeholder="Transaction ID (TrxID)" class="w-full bg-gray-800 p-2 rounded mb-4">
            <button id="submitTopupBtn" class="bg-red-600 w-full py-2 rounded font-bold">✅ SUBMIT REQUEST</button>
        </div>
    </div>

<script>
    // ============ Firebase Configuration ============
    const firebaseConfig = {
        apiKey: "AIzaSyAbRO3XUiT70AjjnehoWUINvI8NVHHkJlQ",
        authDomain: "dx-official-17cac.firebaseapp.com",
        projectId: "dx-official-17cac",
        storageBucket: "dx-official-17cac.firebasestorage.app",
        messagingSenderId: "716949422263",
        appId: "1:716949422263:web:38b1e3ce778bdf094acd32"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ============ SITE SETTINGS ============
    let appName = localStorage.getItem("appName") || "Dx OFFICIAL";
    let featuredText = localStorage.getItem("featuredText") || "Top 12";
    
    document.getElementById("appNameDisplay").innerText = appName;
    document.getElementById("featuredTextDisplay").innerText = featuredText;
    
    // ============ ADS NETWORK লিংক ============
    let adsterra_popunder = localStorage.getItem("adsterra_popunder") || "https://adsterra.com/popunder-default";
    let adsterra_smartlink = localStorage.getItem("adsterra_smartlink") || "https://adsterra.com/smartlink-default";
    let adsterra_socialbar = localStorage.getItem("adsterra_socialbar") || "https://adsterra.com/socialbar-default";
    let adsterra_native = localStorage.getItem("adsterra_native") || "https://adsterra.com/native-default";
    let adsterra_468x60 = localStorage.getItem("adsterra_468x60") || "https://adsterra.com/468x60-default";
    let adsterra_300x250 = localStorage.getItem("adsterra_300x250") || "https://adsterra.com/300x250-default";
    let adsterra_160x300 = localStorage.getItem("adsterra_160x300") || "https://adsterra.com/160x300-default";
    let adsterra_160x600 = localStorage.getItem("adsterra_160x600") || "https://adsterra.com/160x600-default";
    let adsterra_320x50 = localStorage.getItem("adsterra_320x50") || "https://adsterra.com/320x50-default";
    let adsterra_728x90 = localStorage.getItem("adsterra_728x90") || "https://adsterra.com/728x90-default";
    
    let monetag_direct = localStorage.getItem("monetag_direct") || "https://monetag.com/direct-default";
    let monetag_popunder = localStorage.getItem("monetag_popunder") || "https://monetag.com/popunder-default";
    let monetag_inpage = localStorage.getItem("monetag_inpage") || "https://monetag.com/inpage-default";
    let monetag_native = localStorage.getItem("monetag_native") || "https://monetag.com/native-default";
    let monetag_300x250 = localStorage.getItem("monetag_300x250") || "https://monetag.com/300x250-default";
    let monetag_728x90 = localStorage.getItem("monetag_728x90") || "https://monetag.com/728x90-default";
    let monetag_320x50 = localStorage.getItem("monetag_320x50") || "https://monetag.com/320x50-default";
    let monetag_160x600 = localStorage.getItem("monetag_160x600") || "https://monetag.com/160x600-default";
    
    let unlockAdLink = monetag_direct;
    
    // ============ Social Bar ============
    function loadSocialBar() {
        let container = document.getElementById("socialBarContainer");
        if(container && adsterra_socialbar && adsterra_socialbar !== "") {
            container.innerHTML = `
                <div class="bg-red-900/20 border border-red-700 rounded-lg p-3 text-center">
                    <a href="${adsterra_socialbar}" target="_blank" class="text-red-400 text-sm font-bold block">🔗 Join Our Social Network</a>
                    <p class="text-gray-500 text-xs mt-1">Click to get exclusive offers</p>
                </div>
            `;
        }
    }
    
    // ============ Browser Banners ============
    let browserBanners = [
        { name: "468x60 Banner", link: adsterra_468x60 },
        { name: "300x250 Banner", link: adsterra_300x250 },
        { name: "160x300 Banner", link: adsterra_160x300 },
        { name: "160x600 Banner", link: adsterra_160x600 },
        { name: "320x50 Banner", link: adsterra_320x50 },
        { name: "728x90 Banner", link: adsterra_728x90 },
        { name: "Native Banner", link: adsterra_native },
        { name: "Smartlink", link: adsterra_smartlink }
    ];
    
    // ============ VIDEO INTERACTION DATA ============
    let videoStats = JSON.parse(localStorage.getItem("videoStats")) || {};
    let tg = window.Telegram.WebApp;
    tg.expand();
    let currentUserId = tg.initDataUnsafe?.user?.id || "anonymous_" + Date.now();
    let userLikedVideos = JSON.parse(localStorage.getItem("userLiked_" + currentUserId)) || {};
    let userUnlikedVideos = JSON.parse(localStorage.getItem("userUnliked_" + currentUserId)) || {};
    
    function getVideoStats(videoId) {
        if(!videoStats[videoId]) {
            videoStats[videoId] = { likes: 0, unlikes: 0, views: 0, shares: 0 };
        }
        return videoStats[videoId];
    }
    
    function saveVideoStats() {
        localStorage.setItem("videoStats", JSON.stringify(videoStats));
    }
    
    function saveUserStatus() {
        localStorage.setItem("userLiked_" + currentUserId, JSON.stringify(userLikedVideos));
        localStorage.setItem("userUnliked_" + currentUserId, JSON.stringify(userUnlikedVideos));
    }
    
    function likeVideo(videoId) {
        let stats = getVideoStats(videoId);
        if(userLikedVideos[videoId]) {
            stats.likes = Math.max(0, stats.likes - 1);
            delete userLikedVideos[videoId];
        } else {
            if(userUnlikedVideos[videoId]) {
                stats.unlikes = Math.max(0, stats.unlikes - 1);
                delete userUnlikedVideos[videoId];
            }
            stats.likes += 1;
            userLikedVideos[videoId] = true;
        }
        saveVideoStats();
        saveUserStatus();
        renderVideos();
    }
    
    function unlikeVideo(videoId) {
        let stats = getVideoStats(videoId);
        if(userUnlikedVideos[videoId]) {
            stats.unlikes = Math.max(0, stats.unlikes - 1);
            delete userUnlikedVideos[videoId];
        } else {
            if(userLikedVideos[videoId]) {
                stats.likes = Math.max(0, stats.likes - 1);
                delete userLikedVideos[videoId];
            }
            stats.unlikes += 1;
            userUnlikedVideos[videoId] = true;
        }
        saveVideoStats();
        saveUserStatus();
        renderVideos();
    }
    
    function addView(videoId) {
        let stats = getVideoStats(videoId);
        stats.views += 1;
        saveVideoStats();
    }
    
    function shareVideo(videoId, videoTitle, videoUrl) {
        let stats = getVideoStats(videoId);
        stats.shares += 1;
        saveVideoStats();
        
        let shareUrl = "https://t.me/share/url?url=" + encodeURIComponent(videoUrl) + "&text=" + encodeURIComponent(videoTitle);
        window.location.href = shareUrl;
        
        renderVideos();
    }
    
    // ============ DEMO DATA ============
    let currentUser = { id: 1001, name: "Demo User", balance: 45, status: "Free" };
    let allVideos = JSON.parse(localStorage.getItem("videos")) || [
        { id: "1", title: "Premium Video 1", thumbnail: "https://via.placeholder.com/300x200/FF0000/FFFFFF?text=Video+1", cat: "all", videoUrl: "https://example.com/vid1", unlockNeeded: 4 },
        { id: "2", title: "Exclusive Content", thumbnail: "https://via.placeholder.com/300x200/333333/FFFFFF?text=Video+2", cat: "all", videoUrl: "https://example.com/vid2", unlockNeeded: 3 },
        { id: "3", title: "Trending Now", thumbnail: "https://via.placeholder.com/300x200/FF0000/FFFFFF?text=Trending", cat: "trending", videoUrl: "https://example.com/vid3", unlockNeeded: 5 },
        { id: "4", title: "Others Special", thumbnail: "https://via.placeholder.com/300x200/444444/FFFFFF?text=Others", cat: "others", videoUrl: "https://example.com/vid4", unlockNeeded: 2 }
    ];
    
    let supportLinks = JSON.parse(localStorage.getItem("supportLinks")) || {
        "👥 Community Group": "https://t.me/join",
        "📢 Telegram Updates": "https://t.me/updates",
        "📖 How to Use This App": "https://t.me/guide",
        "💾 Backup Channel": "https://t.me/backup",
        "🤖 Support bot": "https://t.me/supportbot",
        "📰 Viral Media": "https://t.me/viralmedia"
    };
    
    let adminNumbers = {
        bKash: localStorage.getItem("bKashNumber") || "01987654321",
        Nagad: localStorage.getItem("nagadNumber") || "01876543210",
        Rocket: localStorage.getItem("rocketNumber") || "01765432109"
    };

    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        currentUser.name = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || "User";
    }
    document.getElementById("tgUsername").innerText = currentUser.name;
    document.getElementById("walletBalance").innerHTML = `💰 Balance: ৳${currentUser.balance}`;
    document.getElementById("userStatus").innerText = currentUser.status;

    let currentCategory = "all";
    let currentSearchQuery = "";
    let selectedVideo = null;

    function renderVideos() {
        let filtered = allVideos.filter(v => (currentCategory === "all" || v.cat === currentCategory) && v.title.toLowerCase().includes(currentSearchQuery.toLowerCase()));
        let grid = document.getElementById("videoGrid");
        grid.innerHTML = "";
        if(filtered.length === 0) {
            grid.innerHTML = `<div class="col-span-2 text-center text-gray-400 py-10">😢 No videos found</div>`;
            return;
        }
        filtered.forEach(v => {
            let stats = getVideoStats(v.id);
            let isLiked = userLikedVideos[v.id] || false;
            let isUnliked = userUnlikedVideos[v.id] || false;
            
            let card = document.createElement("div");
            card.className = "bg-gray-900 rounded-lg overflow-hidden border border-gray-800";
            card.innerHTML = `
                <div class="relative">
                    <img src="${v.thumbnail}" class="w-full h-32 object-cover">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/30">
                        <div class="bg-red-600 rounded-full p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>
                    </div>
                </div>
                <div class="p-2">
                    <p class="text-sm font-semibold truncate">${v.title}</p>
                    <div class="flex justify-between items-center mt-2 text-xs text-gray-400">
                        <div class="flex gap-2">
                            <button class="like-btn interact-btn flex items-center gap-1 ${isLiked ? 'text-red-500' : 'text-gray-400'}" data-id="${v.id}">
                                👍 <span class="like-count">${stats.likes}</span>
                            </button>
                            <button class="unlike-btn interact-btn flex items-center gap-1 ${isUnliked ? 'text-red-500' : 'text-gray-400'}" data-id="${v.id}">
                                👎 <span class="unlike-count">${stats.unlikes}</span>
                            </button>
                            <button class="view-display interact-btn flex items-center gap-1" data-id="${v.id}">
                                👁️ <span class="view-count">${stats.views}</span>
                            </button>
                            <button class="share-btn interact-btn flex items-center gap-1" data-id="${v.id}" data-title="${v.title}" data-url="${v.videoUrl}">
                                🔗 <span class="share-count">${stats.shares}</span>
                            </button>
                        </div>
                    </div>
                    <button class="unlock-btn bg-red-700 w-full mt-2 py-1.5 rounded text-xs font-bold" data-vid='${JSON.stringify(v)}'>🔓 Unlock Access</button>
                </div>
            `;
            grid.appendChild(card);
        });
        
        document.querySelectorAll(".like-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                likeVideo(btn.dataset.id);
            });
        });
        
        document.querySelectorAll(".unlike-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                unlikeVideo(btn.dataset.id);
            });
        });
        
        document.querySelectorAll(".share-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                shareVideo(btn.dataset.id, btn.dataset.title, btn.dataset.url);
            });
        });
        
        document.querySelectorAll(".unlock-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                selectedVideo = JSON.parse(btn.dataset.vid);
                document.getElementById("taskCounter").innerText = `${selectedVideo.unlockNeeded} LEFT`;
                document.getElementById("unlockModal").classList.remove("hidden");
            });
        });
    }

    // Search Functionality
    function openSearchModal() {
        document.getElementById("searchModal").classList.remove("hidden");
        document.getElementById("searchInput").focus();
        updateSearchResults();
    }
    function updateSearchResults() {
        let query = document.getElementById("searchInput").value;
        let results = allVideos.filter(v => v.title.toLowerCase().includes(query.toLowerCase()));
        let container = document.getElementById("searchResults");
        if(results.length === 0) { container.innerHTML = `<div class="text-gray-400 text-center py-4">No matching videos</div>`; return; }
        container.innerHTML = results.map(v => `<div class="bg-gray-800 p-2 rounded cursor-pointer hover:bg-red-900 search-result-item" data-title="${v.title}" data-cat="${v.cat}">🎬 ${v.title} <span class="text-xs text-gray-400">(${v.cat})</span></div>`).join("");
        document.querySelectorAll(".search-result-item").forEach(el => {
            el.addEventListener("click", () => {
                currentSearchQuery = el.dataset.title;
                currentCategory = el.dataset.cat;
                document.querySelectorAll(".category-btn").forEach(btn => { btn.classList.remove("category-active"); if(btn.dataset.cat === currentCategory) btn.classList.add("category-active"); });
                renderVideos();
                document.getElementById("searchModal").classList.add("hidden");
                document.getElementById("searchInput").value = "";
            });
        });
    }
    document.getElementById("searchIconBtn").onclick = openSearchModal;
    document.getElementById("closeSearchBtn").onclick = () => document.getElementById("searchModal").classList.add("hidden");
    document.getElementById("clearSearchBtn").onclick = () => { document.getElementById("searchInput").value = ""; updateSearchResults(); };
    document.getElementById("searchInput").addEventListener("input", updateSearchResults);

    // Category Tabs
    document.querySelectorAll(".category-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("category-active"));
            btn.classList.add("category-active");
            currentCategory = btn.dataset.cat;
            currentSearchQuery = "";
            renderVideos();
        });
    });
    document.querySelector(".category-btn").classList.add("category-active");

    // Unlock Logic
    document.getElementById("confirmUnlockBtn").onclick = () => {
        if(selectedVideo) {
            addView(selectedVideo.id);
        }
        window.open(unlockAdLink, "_blank");
        alert("✅ Ad opened! Content unlocked successfully.");
        document.getElementById("unlockModal").classList.add("hidden");
    };
    document.getElementById("closeModalBtn").onclick = () => document.getElementById("unlockModal").classList.add("hidden");

    // Bottom Navigation
    document.querySelectorAll(".nav-bottom").forEach(nav => {
        nav.addEventListener("click", () => {
            let page = nav.dataset.page;
            document.querySelectorAll(".nav-bottom").forEach(n => {
                n.querySelector("svg").classList.remove("text-red-500");
                n.querySelector("svg").classList.add("text-gray-400");
                n.querySelector("span").classList.remove("text-red-500");
                n.querySelector("span").classList.add("text-gray-400");
            });
            nav.querySelector("svg").classList.remove("text-gray-400");
            nav.querySelector("svg").classList.add("text-red-500");
            nav.querySelector("span").classList.remove("text-gray-400");
            nav.querySelector("span").classList.add("text-red-500");

            if(page === "home") {
                renderVideos();
            } else if(page === "browser") {
                let bannerHtml = browserBanners.map(b => `
                    <div class="bg-gray-800 rounded-lg overflow-hidden p-3 text-center">
                        <a href="${b.link}" target="_blank" class="text-red-400 text-sm block">📢 ${b.name}</a>
                        <p class="text-gray-500 text-xs mt-1">Click to view ad</p>
                    </div>
                `).join("");
                document.getElementById("bannerList").innerHTML = bannerHtml;
                document.getElementById("browserModal").classList.remove("hidden");
            } else if(page === "profile") {
                loadSocialBar();
                document.getElementById("profileModal").classList.remove("hidden");
            } else if(page === "support") {
                let supportHtml = Object.entries(supportLinks).map(([name, link]) => `<a href="${link}" target="_blank" class="bg-red-800 text-center py-2 rounded-lg block font-semibold">${name}</a>`).join("");
                document.getElementById("supportButtons").innerHTML = supportHtml;
                document.getElementById("supportModal").classList.remove("hidden");
            }
        });
    });

    // Top-up functions
    function updateDisplayedNumber() {
        let method = document.getElementById("paymentMethodSelect").value;
        let number = adminNumbers[method] || "01987654321";
        document.getElementById("dynamicAdminNumber").innerText = number;
    }
    document.getElementById("paymentMethodSelect").addEventListener("change", updateDisplayedNumber);

    document.getElementById("topupBtn").onclick = () => {
        updateDisplayedNumber();
        document.getElementById("topupModal").classList.remove("hidden");
    };
    document.getElementById("closeTopupBtn").onclick = () => document.getElementById("topupModal").classList.add("hidden");
    document.getElementById("copyDynamicNumberBtn").onclick = () => {
        let currentNumber = document.getElementById("dynamicAdminNumber").innerText;
        navigator.clipboard.writeText(currentNumber);
        alert("✅ Number copied!");
    };
    document.getElementById("submitTopupBtn").onclick = () => {
        let amount = document.getElementById("topupAmount").value;
        let method = document.getElementById("paymentMethodSelect").value;
        let tgId = document.getElementById("telegramId").value;
        let sender = document.getElementById("senderNumber").value;
        let trx = document.getElementById("transactionId").value;
        if(amount && tgId && sender && trx) {
            alert(`✅ Request sent!\nAmount: ৳${amount}\nMethod: ${method}\nWe'll verify soon.`);
            document.getElementById("topupModal").classList.add("hidden");
        } else {
            alert("❌ Please fill all fields.");
        }
    };

    // Buy Premium
    document.getElementById("buyPremiumBtn").onclick = () => {
        if(currentUser.balance >= 99) {
            currentUser.balance -= 99;
            currentUser.status = "Premium";
            document.getElementById("walletBalance").innerHTML = `💰 Balance: ৳${currentUser.balance}`;
            document.getElementById("userStatus").innerText = "Premium";
            alert("🎉 You are now a Premium member!");
        } else {
            alert("❌ Insufficient balance. Please top-up first.");
        }
    };

    // Close Modals
    document.getElementById("closeBrowserBtn").onclick = () => document.getElementById("browserModal").classList.add("hidden");
    document.getElementById("closeProfileBtn").onclick = () => document.getElementById("profileModal").classList.add("hidden");
    document.getElementById("closeSupportBtn").onclick = () => document.getElementById("supportModal").classList.add("hidden");

    renderVideos();
</script>
</body>
</html>
